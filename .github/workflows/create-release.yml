name: Create Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release-tag:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release-version') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}
        uses: actions/checkout@v6

      - name: Create tag
        run: |
          VERSION=${{ github.event.pull_request.head.ref }}
          VERSION=${VERSION#chore/release-version-}
          echo "Creating tag for version $VERSION"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Update major tag
        run: |
          VERSION=${{ github.event.pull_request.head.ref }}
          VERSION=${VERSION#chore/release-version-}
          MAJOR_VERSION=$(echo $VERSION | cut -d. -f1)
          git tag -f "$MAJOR_VERSION"
          git push origin -f "$MAJOR_VERSION"

  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.PERSONAL_TOKEN }}
          name: Lint action ${{ github.ref_name }}
          body: |
            Lint action version ${{ github.ref_name }} has been released!
          generate_release_notes: true
